name: Metrics
on:
  # Schedule updates (daily)
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual triggering from the Actions tab
  workflow_dispatch:
  # Run on push to main branch
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Classic stats and languages
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: sxrabx
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/sxrabx
          config_timezone: Asia/Kolkata

      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: sxrabx
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: Asia/Kolkata

      - name: Habits Multi-Chart
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: sxrabx
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_facts: no
          plugin_habits_charts: yes
          plugin_habits_charts_type: chartist
          config_timezone: Asia/Kolkata
